version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: baseforge_postgres
    restart: always
    environment:
      POSTGRES_USER: baseforge_user
      POSTGRES_PASSWORD: baseforge_password
      POSTGRES_DB: baseforge_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baseforge_user -d baseforge_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
