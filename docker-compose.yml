version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: baseforge_postgres
    restart: always
    environment:
      POSTGRES_USER: baseforge_user
      POSTGRES_PASSWORD: baseforge_password
      POSTGRES_DB: baseforge_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baseforge_user -d baseforge_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: baseforge_api
    restart: always
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: '3000'
      DATABASE_URL: postgresql://baseforge_user:baseforge_password@postgres:5432/baseforge_db?sslmode=disable
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
